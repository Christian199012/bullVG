<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>AI Bull Finder Demo</title>
  <style>
    :root { color-scheme: light; }
    body{
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:#f6f7fb;
      margin:0;
      padding:28px 14px;
      color:#0f172a;
    }
    .wrap{
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr;
    }
    .card{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:14px;
      box-shadow: 0 8px 30px rgba(15,23,42,0.06);
      overflow:hidden;
    }
    header{
      padding:16px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      border-bottom:1px solid #e5e7eb;
    }
    header h1{
      margin:0;
      font-size:16px;
      letter-spacing:0.2px;
    }
    header .hint{
      font-size:12px;
      color:#475569;
    }
    .grid{
      display:grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 0;
    }
    @media (max-width: 900px){
      .grid{ grid-template-columns: 1fr; }
    }

    /* Chat */
    .chat{
      padding: 16px 16px 10px;
      min-height: 520px;
      display:flex;
      flex-direction:column;
      gap: 10px;
    }
    .bubble{
      max-width: 92%;
      padding: 10px 12px;
      border-radius: 14px;
      line-height: 1.25;
      font-size: 14px;
      border:1px solid transparent;
      white-space: pre-wrap;
    }
    .bot{
      background:#f1f5f9;
      border-color:#e2e8f0;
      align-self:flex-start;
    }
    .user{
      background:#2563eb;
      color:white;
      align-self:flex-end;
    }
    .choices{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top: 6px;
    }
    button.choice{
      border:1px solid #e2e8f0;
      background:#fff;
      color:#0f172a;
      padding: 9px 10px;
      border-radius: 999px;
      font-size: 13px;
      cursor:pointer;
      transition: transform 0.02s ease, background 0.15s ease, border 0.15s ease;
    }
    button.choice:hover{ background:#f8fafc; }
    button.choice:active{ transform: translateY(1px); }
    button.primary{
      background:#0f172a;
      color:#fff;
      border-color:#0f172a;
    }
    .chat-footer{
      padding: 12px 16px 16px;
      border-top:1px solid #e5e7eb;
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
    }
    .pill{
      font-size:12px;
      color:#475569;
      background:#f8fafc;
      border:1px solid #e2e8f0;
      padding: 6px 10px;
      border-radius:999px;
    }
    .linkbtn{
      font-size:12px;
      border:1px solid #e2e8f0;
      background:#fff;
      padding:6px 10px;
      border-radius:999px;
      cursor:pointer;
    }

    /* Results */
    .results{
      border-left:1px solid #e5e7eb;
    }
    @media (max-width: 900px){
      .results{ border-left:none; border-top:1px solid #e5e7eb; }
    }
    .results-inner{
      padding: 16px;
    }
    .results h2{
      margin:0 0 10px 0;
      font-size:14px;
      color:#0f172a;
    }
    .sub{
      margin:0 0 12px 0;
      font-size:12px;
      color:#475569;
    }
    .bull-list{
      display:grid;
      gap:10px;
    }
    .bull{
      border:1px solid #e5e7eb;
      border-radius:14px;
      padding: 12px;
      display:grid;
      gap:8px;
      background:#fff;
    }
    .bull-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }
    .bull-name{
      font-weight: 700;
      font-size: 14px;
    }
    .price{
      font-weight: 700;
      font-size: 13px;
      white-space:nowrap;
    }
    .meta{
      font-size:12px;
      color:#475569;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }
    .badges{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }
    .badge{
      font-size:11px;
      padding: 4px 8px;
      border-radius:999px;
      border:1px solid #e2e8f0;
      background:#f8fafc;
      color:#0f172a;
    }
    .badge.good{ background:#ecfeff; border-color:#a5f3fc; }
    .badge.warn{ background:#fff7ed; border-color:#fed7aa; }
    .cta{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .buy{
      border:none;
      background:#16a34a;
      color:white;
      padding: 8px 10px;
      border-radius:10px;
      cursor:pointer;
      font-weight:700;
      font-size:12px;
    }
    .buy:active{ transform: translateY(1px); }
    .why{
      font-size:12px;
      color:#334155;
      background:#f8fafc;
      border:1px solid #e2e8f0;
      padding:8px 10px;
      border-radius:12px;
    }
    .muted{
      color:#64748b;
      font-size:12px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <header>
        <div>
          <h1>AI Bull Finder — Web Demo (Semen purchase assistant)</h1>
          <div class="hint">Guided chat → filters + ranking → Top picks (mock data)</div>
        </div>
        <div class="pill" id="statusPill">Not started</div>
      </header>

      <div class="grid">
        <!-- Chat -->
        <div>
          <div class="chat" id="chat"></div>
          <div class="chat-footer">
            <button class="linkbtn" id="restartBtn">Restart</button>
            <div class="pill" id="prefsPill">Preferences: —</div>
          </div>
        </div>

        <!-- Results -->
        <div class="results">
          <div class="results-inner">
            <h2>Recommended bulls</h2>
            <p class="sub" id="resultsSub">Answer the questions to see results.</p>
            <div class="bull-list" id="bullList"></div>
            <p class="muted">
              Demo note: This prototype uses mock data and a simple scoring model (no mating / no cow-level matching).
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  // ----------------------------
  // Mock data (edit freely)
  // ----------------------------
  const BULLS = [
    // Holstein
    { id:"H001", name:"Viking Strong", breed:"Holstein", semen:["Sexed","Conventional"], price:{Sexed:38, Conventional:24}, inStock:true,
      calvingEase: 8.8, milk: 105, fat: 85, protein: 80, fertility: 78, health: 82, longevity: 77,
      tags:["Heifer Safe","Robot","Udder"], polled:false, a2a2:false
    },
    { id:"H002", name:"Nordic Power", breed:"Holstein", semen:["Conventional"], price:{Conventional:20}, inStock:true,
      calvingEase: 6.2, milk: 120, fat: 70, protein: 75, fertility: 60, health: 62, longevity: 64,
      tags:["Production"], polled:false, a2a2:false
    },
    { id:"H003", name:"Polar Milk", breed:"Holstein", semen:["Sexed","Conventional"], price:{Sexed:42, Conventional:26}, inStock:true,
      calvingEase: 7.6, milk: 130, fat: 88, protein: 86, fertility: 63, health: 66, longevity: 68,
      tags:["Production","Udder"], polled:false, a2a2:true
    },
    { id:"H004", name:"Arctic Fertility", breed:"Holstein", semen:["Sexed","Conventional"], price:{Sexed:40, Conventional:25}, inStock:false,
      calvingEase: 8.1, milk: 92, fat: 78, protein: 76, fertility: 88, health: 84, longevity: 82,
      tags:["Fertility","Health","Heifer Safe"], polled:false, a2a2:false
    },
    { id:"H005", name:"Viking Polled Star", breed:"Holstein", semen:["Sexed","Conventional"], price:{Sexed:44, Conventional:28}, inStock:true,
      calvingEase: 8.3, milk: 96, fat: 74, protein: 72, fertility: 75, health: 76, longevity: 74,
      tags:["Polled","Heifer Safe"], polled:true, a2a2:false
    },
    { id:"H006", name:"Skylight Health", breed:"Holstein", semen:["Conventional"], price:{Conventional:22}, inStock:true,
      calvingEase: 7.9, milk: 88, fat: 72, protein: 70, fertility: 82, health: 90, longevity: 86,
      tags:["Health","Longevity"], polled:false, a2a2:true
    },

    // Jersey
    { id:"J101", name:"Jersey Gold", breed:"Jersey", semen:["Sexed","Conventional"], price:{Sexed:36, Conventional:22}, inStock:true,
      calvingEase: 9.1, milk: 85, fat: 95, protein: 92, fertility: 76, health: 74, longevity: 78,
      tags:["Heifer Safe","Components"], polled:false, a2a2:true
    },
    { id:"J102", name:"Butter Protein", breed:"Jersey", semen:["Conventional"], price:{Conventional:19}, inStock:true,
      calvingEase: 8.7, milk: 78, fat: 98, protein: 97, fertility: 70, health: 72, longevity: 73,
      tags:["Components"], polled:false, a2a2:false
    },
    { id:"J103", name:"Jersey Easy", breed:"Jersey", semen:["Sexed"], price:{Sexed:34}, inStock:true,
      calvingEase: 9.4, milk: 72, fat: 88, protein: 86, fertility: 82, health: 78, longevity: 80,
      tags:["Heifer Safe","Fertility"], polled:false, a2a2:true
    },

    // RDC
    { id:"R201", name:"Red Balance", breed:"RDC", semen:["Conventional"], price:{Conventional:21}, inStock:true,
      calvingEase: 8.4, milk: 92, fat: 80, protein: 79, fertility: 80, health: 78, longevity: 79,
      tags:["Balanced"], polled:false, a2a2:false
    },
    { id:"R202", name:"Red Robot", breed:"RDC", semen:["Sexed","Conventional"], price:{Sexed:39, Conventional:25}, inStock:true,
      calvingEase: 8.0, milk: 90, fat: 76, protein: 75, fertility: 77, health: 80, longevity: 81,
      tags:["Robot","Udder"], polled:true, a2a2:false
    },
  ];

  // ----------------------------
  // State
  // ----------------------------
  const state = {
    breed: null,        // "Holstein" | "Jersey" | "RDC"
    animal: null,       // "Heifer" | "Cow"
    semen: null,        // "Sexed" | "Conventional"
    focus: null,        // "Balanced" | "Production" | "Health & Fertility" | "Heifer Safe"
    mustPolled: false,
    mustA2A2: false,
    inStockOnly: true,
  };

  const chatEl = document.getElementById("chat");
  const bullListEl = document.getElementById("bullList");
  const statusPill = document.getElementById("statusPill");
  const prefsPill = document.getElementById("prefsPill");
  const resultsSub = document.getElementById("resultsSub");
  const restartBtn = document.getElementById("restartBtn");

  restartBtn.addEventListener("click", () => start());

  function pillText(){
    const bits = [];
    if(state.breed) bits.push(state.breed);
    if(state.animal) bits.push(state.animal);
    if(state.semen) bits.push(state.semen);
    if(state.focus) bits.push(state.focus);
    if(state.mustPolled) bits.push("Polled");
    if(state.mustA2A2) bits.push("A2A2");
    if(state.inStockOnly) bits.push("In stock only");
    return bits.length ? bits.join(" · ") : "—";
  }

  function addBubble(text, who="bot"){
    const div = document.createElement("div");
    div.className = `bubble ${who}`;
    div.textContent = text;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function addChoices(options){
    const wrap = document.createElement("div");
    wrap.className = "choices";
    options.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "choice" + (opt.primary ? " primary" : "");
      btn.textContent = opt.label;
      btn.onclick = () => opt.onClick();
      wrap.appendChild(btn);
    });
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function setStatus(text){
    statusPill.textContent = text;
    prefsPill.textContent = "Preferences: " + pillText();
  }

  // ----------------------------
  // Scoring model (simple, explainable)
  // ----------------------------
  function weightsForFocus(){
    // All traits 0..100-ish in mock data. Higher is better for these.
    // calvingEase: higher is easier.
    switch(state.focus){
      case "Production":
        return { milk:0.45, fat:0.15, protein:0.15, fertility:0.05, health:0.10, longevity:0.10, calving:0.0 };
      case "Health & Fertility":
        return { milk:0.10, fat:0.05, protein:0.05, fertility:0.40, health:0.25, longevity:0.15, calving:0.0 };
      case "Heifer Safe":
        return { milk:0.15, fat:0.05, protein:0.05, fertility:0.15, health:0.10, longevity:0.10, calving:0.40 };
      case "Balanced":
      default:
        return { milk:0.25, fat:0.10, protein:0.10, fertility:0.20, health:0.15, longevity:0.15, calving:0.05 };
    }
  }

  function scoreBull(b){
    const w = weightsForFocus();
    const calv = b.calvingEase * 10; // scale ~0-100
    return (
      w.milk*b.milk +
      w.fat*b.fat +
      w.protein*b.protein +
      w.fertility*b.fertility +
      w.health*b.health +
      w.longevity*b.longevity +
      w.calving*calv
    );
  }

  function explainBull(b){
    const reasons = [];
    if(state.animal === "Heifer" && b.calvingEase >= 8.0) reasons.push("high calving ease for heifers");
    if(state.focus === "Production" && (b.milk >= 115 || (b.fat+b.protein) >= 165)) reasons.push("strong production profile");
    if(state.focus === "Health & Fertility" && (b.fertility >= 78 || b.health >= 82)) reasons.push("health/fertility oriented");
    if(state.mustPolled && b.polled) reasons.push("polled requirement");
    if(state.mustA2A2 && b.a2a2) reasons.push("A2A2 requirement");
    if(reasons.length === 0) reasons.push("overall good match to your settings");
    return "Why: " + reasons.slice(0,2).join("; ") + ".";
  }

  function badgeClass(label){
    const good = ["Heifer Safe","Polled","A2A2","Health","Fertility","Robot","Components","Longevity"];
    const warn = ["Production"];
    if(good.includes(label)) return "badge good";
    if(warn.includes(label)) return "badge warn";
    return "badge";
  }

  function renderResults(){
    prefsPill.textContent = "Preferences: " + pillText();

    // Require at least breed + semen + animal to show real results
    const ready = !!(state.breed && state.animal && state.semen && state.focus);
    if(!ready){
      bullListEl.innerHTML = "";
      resultsSub.textContent = "Answer the questions to see results.";
      return;
    }

    // Filter
    let list = BULLS.filter(b => b.breed === state.breed);

    if(state.inStockOnly) list = list.filter(b => b.inStock);
    list = list.filter(b => b.semen.includes(state.semen));

    if(state.animal === "Heifer"){
      // Simple safety gate for demo
      list = list.filter(b => b.calvingEase >= 8.0);
    }

    if(state.mustPolled) list = list.filter(b => b.polled);
    if(state.mustA2A2) list = list.filter(b => b.a2a2);

    // Score + sort
    const scored = list
      .map(b => ({ b, s: scoreBull(b) }))
      .sort((x,y) => y.s - x.s)
      .slice(0, 10);

    if(scored.length === 0){
      bullListEl.innerHTML = "";
      resultsSub.textContent = "No bulls match these filters. Try removing Polled/A2A2 or switching semen type.";
      return;
    }

    resultsSub.textContent = `Top ${scored.length} picks based on filters + "${state.focus}" scoring.`;

    // Render
    bullListEl.innerHTML = "";
    scored.forEach(({b, s}, idx) => {
      const el = document.createElement("div");
      el.className = "bull";

      const price = b.price[state.semen];
      const badges = [];
      if(b.polled) badges.push("Polled");
      if(b.a2a2) badges.push("A2A2");
      b.tags.forEach(t => badges.push(t));

      el.innerHTML = `
        <div class="bull-top">
          <div>
            <div class="bull-name">#${idx+1} — ${b.name} <span style="font-weight:600;color:#64748b">(${b.id})</span></div>
            <div class="meta">
              <span>Breed: ${b.breed}</span>
              <span>Calving ease: ${b.calvingEase.toFixed(1)}</span>
              <span>Score: ${s.toFixed(0)}</span>
            </div>
          </div>
          <div class="price">€${price}/dose</div>
        </div>

        <div class="badges">
          ${badges.slice(0,7).map(t => `<span class="${badgeClass(t)}">${t}</span>`).join("")}
        </div>

        <div class="why">${explainBull(b)}</div>

        <div class="cta">
          <div class="meta">
            <span>Milk: ${b.milk}</span>
            <span>Fertility: ${b.fertility}</span>
            <span>Health: ${b.health}</span>
          </div>
          <button class="buy" onclick="alert('Demo: added ${b.name} (${state.semen}) to cart')">Add to cart</button>
        </div>
      `;
      bullListEl.appendChild(el);
    });
  }

  // ----------------------------
  // Chat flow
  // ----------------------------
  function clearChat(){
    chatEl.innerHTML = "";
  }

  function start(){
    // Reset state
    state.breed = null;
    state.animal = null;
    state.semen = null;
    state.focus = null;
    state.mustPolled = false;
    state.mustA2A2 = false;
    state.inStockOnly = true;

    clearChat();
    setStatus("In progress");
    addBubble("Hi! I can help you find bulls to purchase semen.\nNo mating matching — just quick buying recommendations.\n\nLet’s start: Which breed are you looking for?");
    addChoices([
      { label:"Holstein", primary:true, onClick: () => { choose("breed","Holstein"); } },
      { label:"Jersey", onClick: () => { choose("breed","Jersey"); } },
      { label:"RDC", onClick: () => { choose("breed","RDC"); } },
    ]);
    renderResults();
  }

  function choose(key, value){
    state[key] = value;
    addBubble(value, "user");

    if(key === "breed") return askAnimal();
    if(key === "animal") return askSemen();
    if(key === "semen") return askFocus();
    if(key === "focus") return askMustHaves();
    renderResults();
  }

  function askAnimal(){
    addBubble("Great. Is this semen mainly for heifers or cows?");
    addChoices([
      { label:"Heifer (prioritize calving ease)", primary:true, onClick: () => choose("animal","Heifer") },
      { label:"Cow", onClick: () => choose("animal","Cow") },
    ]);
    renderResults();
  }

  function askSemen(){
    addBubble("What semen type do you want?");
    addChoices([
      { label:"Sexed", primary:true, onClick: () => choose("semen","Sexed") },
      { label:"Conventional", onClick: () => choose("semen","Conventional") },
    ]);
    renderResults();
  }

  function askFocus(){
    addBubble("What’s your main focus for ranking the bulls?");
    addChoices([
      { label:"Balanced", primary:true, onClick: () => choose("focus","Balanced") },
      { label:"Production", onClick: () => choose("focus","Production") },
      { label:"Health & Fertility", onClick: () => choose("focus","Health & Fertility") },
      { label:"Heifer Safe", onClick: () => choose("focus","Heifer Safe") },
    ]);
    renderResults();
  }

  function askMustHaves(){
    addBubble("Any must-have traits? (Optional)");
    addChoices([
      { label: state.mustPolled ? "✅ Polled" : "Polled", onClick: () => { state.mustPolled = !state.mustPolled; refreshStep(); } },
      { label: state.mustA2A2 ? "✅ A2A2" : "A2A2", onClick: () => { state.mustA2A2 = !state.mustA2A2; refreshStep(); } },
      { label: state.inStockOnly ? "✅ In stock only" : "In stock only", primary:true, onClick: () => { state.inStockOnly = !state.inStockOnly; refreshStep(); } },
      { label:"Show results", primary:true, onClick: () => finalize(); },
    ]);
    renderResults();
  }

  function refreshStep(){
    // remove last choices row and re-ask must haves cleanly
    // simplest: restart from must-have question
    // keep chat bubbles; just add a small bot note
    addBubble("Updated filters.", "bot");
    renderResults();
  }

  function finalize(){
    addBubble("Show results", "user");
    addBubble("Done — here are your top recommendations. You can restart anytime to try another scenario.");
    setStatus("Ready");
    renderResults();
  }

  // Init
  start();
</script>
</body>
</html>
